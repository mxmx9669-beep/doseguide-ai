<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THERAGUARD AI | المنصة السريرية</title>
    </head>
<body>

    <header class="app-header">
        <div class="logo-area">
            <span class="logo-icon">⚕️</span>
            <div class="logo-text">
                <h1>THERAGUARD <span>AI</span></h1>
                <p>المنصة السريرية الذكية</p>
            </div>
        </div>
        <div class="header-meta">
            <span class="status-badge">System Active</span>
            <span class="user-badge">د. محمد الإسحاق</span>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <nav class="side-nav">
                <button class="nav-item active" data-tab="soap">📋 تحليل SOAP</button>
                <button class="nav-item" data-tab="coverage">🎯 التغطية الدوائية</button>
                <button class="nav-item" data-tab="home-meds">🏠 الأدوية المنزلية</button>
                <button class="nav-item" data-tab="prophy">🛡️ الوقاية</button>
                <button class="nav-item" data-tab="verification">💊 التحقق الدقيق</button>
            </nav>
            <div class="sidebar-footer">
                <p>Designed by Mohammed Al-Ishaq</p>
            </div>
        </aside>

        <main class="main-dashboard">
            <div class="metrics-bar">
                <div class="metric-card primary">
                    <label>CrCl (mL/min)</label>
                    <span id="crcl-value">--</span>
                </div>
                <div class="metric-grid">
                    <div class="mini-metric">SCr: <span id="scr-val">--</span></div>
                    <div class="mini-metric">Weight: <span id="weight-val">--</span></div>
                    <div class="mini-metric">IBW: <span id="ibw-val">--</span></div>
                </div>
            </div>

            <section class="chat-interface" id="output-area">
                <div class="welcome-screen">
                    <div class="icon-circle">⚕️</div>
                    <h2>جاهز للتحليل السريري</h2>
                    <p>أدخل بيانات الحالة في المنطقة المخصصة لبدء المراجعة</p>
                </div>
                </section>

            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea id="case-input" placeholder="الصق بيانات الحالة، التحاليل، والأدوية هنا..."></textarea>
                    <div class="action-buttons">
                        <button id="clear-btn" class="btn-secondary">مسح</button>
                        <button id="analyze-btn" class="btn-primary">تحليل الحالة</button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <style>
        :root {
            --bg-dark: #020617;
            --surface-dark: #0f172a;
            --border-color: #1e293b;
            --primary-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-rose: #f43f5e;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Styles */
        .app-header {
            height: 70px;
            background: var(--surface-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo-icon { font-size: 1.8rem; background: #0891b2; padding: 5px; border-radius: 12px; }
        .logo-text h1 { font-size: 1.2rem; letter-spacing: 1px; }
        .logo-text h1 span { color: var(--primary-cyan); font-weight: 300; }
        .logo-text p { font-size: 0.7rem; color: var(--text-dim); }

        .status-badge { font-size: 0.7rem; color: #10b981; border: 1px solid #10b981; padding: 4px 12px; border-radius: 20px; }

        /* Layout Structure */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background: var(--surface-dark);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .nav-item {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 12px 15px;
            text-align: right;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .nav-item:hover, .nav-item.active {
            background: #1e293b;
            color: var(--primary-cyan);
            border-color: #334155;
        }

        .sidebar-footer { margin-top: auto; font-size: 0.6rem; color: #475569; text-align: center; }

        /* Main Dashboard */
        .main-dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .metrics-bar {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            background: rgba(15, 23, 42, 0.5);
        }

        .metric-card.primary { text-align: center; }
        .metric-card.primary label { display: block; font-size: 0.6rem; color: var(--primary-cyan); font-weight: bold; }
        .metric-card.primary span { font-size: 2.5rem; font-weight: 900; font-family: 'Courier New', Courier, monospace; }

        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 2rem; font-size: 0.8rem; color: var(--text-dim); }

        /* Chat Interface Styles */
        .chat-interface {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .welcome-screen { margin: auto; text-align: center; opacity: 0.5; }
        .icon-circle { font-size: 3rem; margin-bottom: 1rem; }

        /* Input Area Styles */
        .input-area {
            padding: 1.5rem 2rem;
            background: var(--surface-dark);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #020617;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: #fff;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            resize: none;
            outline: none;
        }

        textarea:focus { border-color: var(--primary-cyan); }

        .action-buttons { display: flex; justify-content: flex-end; gap: 1rem; }
        
        button.btn-primary {
            background: var(--primary-cyan);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        button.btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border-color);
            padding: 12px 30px;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>

    <script>
        // DOM Elements
        const analyzeBtn = document.getElementById('analyze-btn');
        const clearBtn = document.getElementById('clear-btn');
        const caseInput = document.getElementById('case-input');
        const outputArea = document.getElementById('output-area');
        
        // Mock API Variables (Placeholders for Backend Logic)
        let clinicalData = {
            renal: { crcl: 75, scr: 110, weight: 80, ibw: 72 },
            soap: "S: المريض يعاني من...\nO: النتائج المخبرية تشير إلى...\nA: التقييم السريري...",
        };

        // Function: Analyze Case
        function runAnalysis() {
            const text = caseInput.value.trim();
            if(!text) return alert("الرجاء إدخال بيانات الحالة أولاً");

            // UI Feedback
            analyzeBtn.innerText = "جاري التحليل...";
            analyzeBtn.disabled = true;

            // Simulate Backend Latency
            setTimeout(() => {
                updateDashboard(clinicalData);
                analyzeBtn.innerText = "تحليل الحالة";
                analyzeBtn.disabled = false;
            }, 1000);
        }

        // Function: Update UI Metrics
        function updateDashboard(data) {
            document.getElementById('crcl-value').innerText = data.renal.crcl;
            document.getElementById('scr-val').innerText = data.renal.scr;
            document.getElementById('weight-val').innerText = data.renal.weight;
            document.getElementById('ibw-val').innerText = data.renal.ibw;

            // Update Chat Area with SOAP Result
            outputArea.innerHTML = `
                <div style="background: #1e293b; padding: 2rem; border-radius: 20px; line-height: 2;">
                    <h3 style="color: var(--primary-cyan); margin-bottom: 1rem;">نتائج التحليل (SOAP):</h3>
                    <pre style="white-space: pre-wrap; font-family: inherit; color: #cbd5e1;">${data.soap}</pre>
                </div>
            `;
        }

        // Function: Clear Dashboard
        function clearDashboard() {
            caseInput.value = "";
            document.getElementById('crcl-value').innerText = "--";
            outputArea.innerHTML = `
                <div class="welcome-screen">
                    <div class="icon-circle">⚕️</div>
                    <h2>جاهز للتحليل السريري</h2>
                    <p>أدخل بيانات الحالة في المنطقة المخصصة لبدء المراجعة</p>
                </div>
            `;
        }

        // Event Listeners
        analyzeBtn.addEventListener('click', runAnalysis);
        clearBtn.addEventListener('click', clearDashboard);

        // Sidebar Navigation Handling
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelector('.nav-item.active').classList.remove('active');
                this.classList.add('active');
            });
        });
    </script>

</body>
</html>
