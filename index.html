<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THERAGUARD AI | Clinical Decision Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --canvas: #f4f7f9;
            --panel: #ffffff;
            --brand: #0f172a;
            --brand-accent: #2563eb;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --radius: 8px;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--canvas);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout Structure */
        .app-wrapper {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar / Input Zone */
        .sidebar {
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: var(--brand);
            border-radius: 6px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: 700;
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 24px; }
        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        select, textarea {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        textarea {
            height: 300px;
            resize: none;
            line-height: 1.5;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--brand-accent);
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: var(--canvas);
            padding: 4px;
            border-radius: var(--radius);
        }

        .mode-btn {
            border: none;
            background: transparent;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--panel);
            color: var(--brand-accent);
            box-shadow: var(--shadow);
        }

        .action-btn {
            background: var(--brand);
            color: white;
            border: none;
            padding: 16px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
            margin-top: auto;
        }

        .action-btn:hover { opacity: 0.9; }

        /* Main Workspace / Output Zone */
        .workspace {
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .workspace-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-tertiary);
            text-align: center;
        }

        /* Result Components */
        .result-container { display: none; max-width: 1000px; margin: 0 auto; width: 100%; }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .metric-card {
            background: var(--panel);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-bottom: 3px solid var(--border);
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand);
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .verdict-panel {
            background: var(--panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            margin-bottom: 32px;
            white-space: pre-wrap;
            font-size: 1rem;
            color: var(--text-primary);
            border-left: 4px solid var(--brand-accent);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .status-ready { background: #e0f2fe; color: #0369a1; }
        .status-locked { background: #fee2e2; color: #991b1b; }

        .source-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(244, 247, 249, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            place-items: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--brand-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1000px) {
            .app-wrapper { grid-template-columns: 1fr; }
            .sidebar { height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .app-wrapper { overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="spinner"></div>
</div>

<div class="app-wrapper">
    <aside class="sidebar">
        <div class="brand-header">
            <div class="brand-logo">TG</div>
            <div class="brand-name">TheraGuard AI</div>
        </div>

        <div class="input-group">
            <label class="input-label">Focus Drug / Topic</label>
            <select id="drug">
                <option value="General Analysis">General Analysis</option>
                <option value="warfarin">Warfarin</option>
                <option value="insulin">Insulin</option>
                <option value="amoxicillin">Amoxicillin</option>
                <option value="vancomycin">Vancomycin</option>
            </select>
        </div>

        <div class="input-group">
            <label class="input-label">Patient Case Context</label>
            <textarea id="question" placeholder="Paste comprehensive medical history, labs, and current medication list..."></textarea>
        </div>

        <div class="input-group">
            <label class="input-label">Output Configuration</label>
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setMode('Hybrid', this)">Hybrid</button>
                <button class="mode-btn" onclick="setMode('Short', this)">Short</button>
                <button class="mode-btn" onclick="setMode('Verbatim', this)">Verbatim</button>
                <button class="mode-btn" onclick="setMode('Source', this)">Source</button>
            </div>
            <input type="hidden" id="output_mode" value="Hybrid">
        </div>

        <div class="input-group">
            <label class="input-label">Linguistic Preference</label>
            <select id="language">
                <option value="en">English (Clinical Standard)</option>
                <option value="ar">Arabic (Medical Translation)</option>
            </select>
        </div>

        <div class="input-group" style="display:none;">
            <select id="answer_style"><option value="Recommended">Recommended</option></select>
        </div>

        <button class="action-btn" id="analyzeBtn">GENERATE ANALYSIS</button>
        <button class="mode-btn" style="margin-top: 12px;" onclick="handleClear()">Reset Workspace</button>
    </aside>

    <main class="workspace">
        <div id="emptyState" class="workspace-empty">
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <p style="margin-top: 16px;">Awaiting case data for clinical validation</p>
        </div>

        <div id="resultPanel" class="result-container">
            <div id="statusArea">
                <span id="lockedIndicator" class="status-badge status-locked" style="display:none">Protocol Locked</span>
                <span id="statusLabel" class="status-badge status-ready">Analysis Complete</span>
            </div>

            <div class="section-title">Extracted Biometrics</div>
            <div id="metricsGrid" class="metrics-grid">
                </div>

            <div class="section-title">Clinical Interventions & Verdict</div>
            <div class="verdict-panel" id="verdictContent"></div>

            <div class="source-footer">
                <div class="section-title">Evidence & Citations</div>
                <div id="sourceContent"></div>
            </div>
        </div>
    </main>
</div>

<script>
    const WORKER_BASE = "https://aged-fog-802f.mxmx9669.workers.dev";
    const ASK_ENDPOINT = `${WORKER_BASE}/ask`;

    // --- Core Logic Integration ---

    async function handleAsk() {
        const payload = {
            drug: document.getElementById('drug').value,
            language: document.getElementById('language').value,
            answer_style: document.getElementById('answer_style').value,
            output_mode: document.getElementById('output_mode').value,
            question: document.getElementById('question').value
        };

        if (!payload.question.trim()) {
            alert("Please provide patient case details.");
            return;
        }

        // UI Prep
        toggleLoader(true);
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('verdictContent').innerText = "Analyzing patient data against clinical protocols...";
        
        try {
            const response = await fetch(ASK_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            const data = await response.json();
            const out = normalizeWorkerResponse(data);
            
            renderAnalysis(out, payload.question);
        } catch (error) {
            document.getElementById('verdictContent').innerHTML = `<span style="color:var(--danger)">Analysis Failed: ${error.message}</span>`;
        } finally {
            toggleLoader(false);
        }
    }

    function renderAnalysis(data, originalText) {
        // Verdict
        document.getElementById('verdictContent').innerText = data.verdict || "No findings generated.";
        
        // Citations
        document.getElementById('sourceContent').innerText = data.source || "Clinical evidence synthesis applied.";
        
        // Protocol Lock
        document.getElementById('lockedIndicator').style.display = data.locked ? 'inline-flex' : 'none';

        // Auto-extract Metrics (Simulated Extraction for UI richness)
        extractMetrics(originalText);
    }

    function extractMetrics(text) {
        const grid = document.getElementById('metricsGrid');
        grid.innerHTML = '';
        
        // Logic for extracting values from raw text
        const find = (regex, label) => {
            const match = text.match(regex);
            if (match) {
                const card = document.createElement('div');
                card.className = 'metric-card';
                card.innerHTML = `<div class="metric-value">${match[1]}</div><div class="metric-label">${label}</div>`;
                grid.appendChild(card);
            }
        };

        find(/Weight\s*[:=]\s*(\d+\s*kg)/i, 'Patient Weight');
        find(/CrCl\s*[:=]\s*(\d+\s*ml\/min)/i, 'Est. CrCl');
        find(/Age\s*[:=]\s*(\d+\s*yo)/i, 'Patient Age');
        find(/BMI\s*[:=]\s*(\d+(\.\d+)?)/i, 'Body Mass Index');

        if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="color:var(--text-tertiary); font-size:0.8rem;">No explicit biometric markers found in case text.</div>';
        }
    }

    // --- Utilities (Retained from original logic) ---

    function setMode(val, btn) {
        document.getElementById('output_mode').value = val;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function toggleLoader(show) {
        document.getElementById('loader').style.display = show ? 'grid' : 'none';
    }

    function handleClear() {
        document.getElementById('question').value = '';
        document.getElementById('resultPanel').style.display = 'none';
        document.getElementById('emptyState').style.display = 'flex';
    }

    function normalizeWorkerResponse(data) {
        const locked = Boolean(data.locked || data.protocol_locked || data?.result?.locked);
        const verdict = data.verdict || data.answer || data.reply || data.text || data?.result?.verdict || "";
        const source = data.source || data.sources || data.citations || data?.result?.source || "";
        return { locked, verdict, source };
    }

    document.getElementById('analyzeBtn').addEventListener('click', handleAsk);

</script>

</body>
</html>
