<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoseGuide AI · Clinical Decision Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      background: #f0f4f8;
      color: #0b1c33;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app-card {
      max-width: 1100px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 20, 60, 0.25);
      overflow: hidden;
    }

    .app-header {
      padding: 24px 32px;
      border-bottom: 1px solid #e9eef3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      background: linear-gradient(135deg, #1a5c9e, #0d3b6f);
      width: 48px; height: 48px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 24px; font-weight: 700;
    }

    .logo-text h1 { font-size: 1.6rem; font-weight: 700; color: #1a3b5c; }
    .logo-text span { font-size: 0.8rem; color: #5e7185; display: block; }

    .main-layout { display: grid; grid-template-columns: 300px 1fr; background: #fafcff; }

    /* Configuration Panel */
    .context-panel { background: #f5f9ff; border-right: 1px solid #dde3ea; padding: 28px 20px; }
    .panel-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: #5b6f87; margin-bottom: 24px; }
    
    .param-group { margin-bottom: 24px; }
    .param-label { display: block; font-size: 0.85rem; font-weight: 600; color: #1f334a; margin-bottom: 8px; }
    .param-select {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #d4dce6;
      font-size: 0.9rem; outline: none; background: white; cursor: pointer;
    }

    .mode-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .mode-pill {
      flex: 1; padding: 8px; font-size: 0.75rem; font-weight: 600; text-align: center;
      background: white; border: 1px solid #ccd7e6; border-radius: 8px; cursor: pointer;
    }
    .mode-pill.active { background: #1a4c8c; color: white; border-color: #1a4c8c; }

    /* Interaction Panel */
    .interaction-panel { padding: 32px; }
    .question-box {
      background: white; border: 1px solid #dbe1e9; border-radius: 20px;
      padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    textarea {
      width: 100%; border: none; outline: none; font-size: 1rem;
      min-height: 120px; font-family: inherit; resize: vertical;
    }

    .action-bar { display: flex; gap: 12px; align-items: center; }
    .primary-btn {
      background: #1a4c8c; color: white; border: none; padding: 14px 32px;
      border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .secondary-btn { background: none; border: 1px solid #ccd7e6; padding: 14px 24px; border-radius: 50px; cursor: pointer; }

    /* Results Area */
    .results-container { margin-top: 32px; display: none; }
    .status-strip { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-warn { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #e0f2fe; color: #0369a1; }

    .answer-card {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px;
      padding: 24px; margin-bottom: 24px;
    }
    .answer-text { font-size: 1.05rem; line-height: 1.7; color: #0f172a; white-space: pre-wrap; }

    .citation-item {
      background: white; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 16px; margin-bottom: 12px; font-size: 0.9rem;
    }
    .citation-header { font-weight: 700; color: #334155; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .citation-excerpt { color: #64748b; font-style: italic; border-left: 3px solid #cbd5e1; padding-left: 12px; margin-top: 8px; }

    .loader {
      border: 3px solid #f3f3f3; border-top: 3px solid #1a4c8c;
      border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app-card">
  <header class="app-header">
    <div class="logo-area">
      <div class="logo-icon">DG</div>
      <div class="logo-text">
        <h1>DoseGuide AI</h1>
        <span>Clinical Evidence Engine · Protocol Bound</span>
      </div>
    </div>
    <div class="badge badge-info">🧬 System Ready</div>
  </header>

  <div class="main-layout">
    <aside class="context-panel">
      <div class="panel-title">Analysis Parameters</div>
      
      <div class="param-group">
        <label class="param-label">Clinical Language</label>
        <select class="param-select" id="language">
          <option value="en">English (Clinical)</option>
          <option value="ar">العربية (طبي)</option>
        </select>
      </div>

      <div class="param-group">
        <label class="param-label">Output Mode</label>
        <div class="mode-pills" id="modeGroup">
          <div class="mode-pill active" data-mode="hybrid">Hybrid</div>
          <div class="mode-pill" data-mode="short">Short</div>
          <div class="mode-pill" data-mode="verbatim">Verbatim</div>
        </div>
        <input type="hidden" id="output_mode" value="hybrid">
      </div>

      <div class="param-group">
        <label class="param-label">Source Validation</label>
        <select class="param-select" id="source_mode">
          <option value="required">Strict (Protocol Only)</option>
          <option value="off">Relaxed (General Knowledge)</option>
        </select>
      </div>

      <div class="param-group" style="display:none">
         <select id="answer_style"><option value="recommended">Recommended</option></select>
         <select id="drug"><option value="general">General</option></select>
      </div>
    </aside>

    <main class="interaction-panel">
      <div class="question-box">
        <textarea id="question" placeholder="Ask a clinical question (e.g., Warfarin loading dose for renal patients)..."></textarea>
      </div>

      <div class="action-bar">
        <button class="primary-btn" id="askBtn">Run Clinical Analysis</button>
        <button class="secondary-btn" id="clearBtn">Clear</button>
      </div>

      <section id="resultPanel" class="results-container">
        <div class="status-strip">
          <span id="statusBadge" class="badge">Status</span>
          <span id="protocolLocked" class="badge badge-warn" style="display:none">🔒 Protocol Locked</span>
        </div>

        <div class="answer-card">
          <h3 style="font-size: 0.8rem; text-transform: uppercase; color: #64748b; margin-bottom: 12px;">Evidence Summary</h3>
          <div class="answer-text" id="verdictContent"></div>
        </div>

        <div id="sourcesSection">
          <h3 style="font-size: 0.8rem; text-transform: uppercase; color: #64748b; margin-bottom: 12px;">Cited References</h3>
          <div id="sourceContent"></div>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
  // Configuration
  const ASK_ENDPOINT = "/ask"; 

  // DOM Elements
  const askBtn = document.getElementById('askBtn');
  const clearBtn = document.getElementById('clearBtn');
  const questionInput = document.getElementById('question');
  const resultPanel = document.getElementById('resultPanel');
  const verdictContent = document.getElementById('verdictContent');
  const sourceContent = document.getElementById('sourceContent');
  const statusBadge = document.getElementById('statusBadge');
  const protocolLocked = document.getElementById('protocolLocked');
  const outputModeInput = document.getElementById('output_mode');

  // Handle Mode Selection
  document.querySelectorAll('.mode-pill').forEach(pill => {
    pill.addEventListener('click', function() {
      document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      outputModeInput.value = this.dataset.mode;
    });
  });

  // Clear Logic
  clearBtn.addEventListener('click', () => {
    questionInput.value = '';
    resultPanel.style.display = 'none';
  });

  // Main Ask Function
  async function handleAsk() {
    const question = questionInput.value.trim();
    if (!question) return alert("Please enter a question.");

    // Update UI
    askBtn.disabled = true;
    askBtn.innerHTML = `<span class="loader"></span> Analyzing...`;
    resultPanel.style.display = 'block';
    verdictContent.innerText = "Processing clinical data...";
    sourceContent.innerHTML = "";
    statusBadge.className = "badge badge-info";
    statusBadge.innerText = "Searching Vector Store";
    protocolLocked.style.display = "none";

    // Build Payload to match Backend structure
    const payload = {
      question: question,
      language: document.getElementById('language').value,
      output_mode: outputModeInput.value,
      source_mode: document.getElementById('source_mode').value,
      answer_style: document.getElementById('answer_style').value,
      drug: document.getElementById('drug').value
    };

    try {
      const response = await fetch(ASK_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      
      if (!response.ok) throw new Error(data.error || "Server Communication Error");

      // Handle Result (Matches Backend Verdicts)
      if (data.verdict === "NOT_FOUND") {
        statusBadge.className = "badge badge-warn";
        statusBadge.innerText = "Not Found";
        verdictContent.innerText = data.answer || "No matching clinical protocols found in the library.";
        sourceContent.innerHTML = "<em>Analysis failed to meet source_mode criteria.</em>";
      } else {
        statusBadge.className = "badge badge-ok";
        statusBadge.innerText = "Validated";
        verdictContent.innerText = data.answer;
        
        // Render Citations
        if (data.citations && data.citations.length > 0) {
          sourceContent.innerHTML = data.citations.map(c => `
            <div class="citation-item">
              <div class="citation-header">
                <span>📄 ${c.filename} · Sec: ${c.section}</span>
                <span>Page: ${c.page > 0 ? c.page : 'N/A'}</span>
              </div>
              <div class="citation-excerpt">"${c.excerpt}..."</div>
            </div>
          `).join('');
        } else {
          sourceContent.innerHTML = "<em>No specific citations attached.</em>";
        }
      }

      // Display Lock if protocol mentioned in Backend
      if (data.applied_output && data.applied_output.source_mode === "required") {
         protocolLocked.style.display = "inline-block";
      }

    } catch (err) {
      statusBadge.className = "badge badge-warn";
      statusBadge.innerText = "Error";
      verdictContent.innerHTML = `<span style="color:red">⚠️ System Error: ${err.message}</span>`;
    } finally {
      askBtn.disabled = false;
      askBtn.innerText = "Run Clinical Analysis";
    }
  }

  askBtn.addEventListener('click', handleAsk);

  // Shortcut Support
  questionInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') handleAsk();
  });
</script>

</body>
</html>
