<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheraGuard AI | Clinical Pharmacist Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0f172a;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --bg-main: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #1e293b;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-container {
      max-width: 1200px;
      margin: 40px auto;
      width: 95%;
      flex: 1;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand h1 {
      font-size: 2rem;
      color: var(--primary);
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .brand p { color: #64748b; font-size: 0.9rem; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    .card-title { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: #64748b; letter-spacing: 1px; }

    textarea {
      width: 100%;
      height: 500px;
      padding: 20px;
      border: 1px solid #f1f5f9;
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      resize: none;
      background: #f8fafc;
      transition: all 0.2s;
    }

    textarea:focus { outline: none; border-color: var(--accent); background: white; }

    .output-area {
      width: 100%;
      height: 500px;
      padding: 20px;
      background: #ffffff;
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #334155;
      border: 1px solid #f1f5f9;
    }

    .controls {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
      border: none;
    }

    .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

    .btn-secondary { background: white; color: #64748b; border: 1px solid var(--border); }
    .btn-secondary:hover { background: #f8fafc; }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
    }

    .error-message {
      color: #ef4444;
      background: #fee2e2;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 0.8rem;
    }

    .loading-pulse {
      display: none;
      text-align: center;
      color: var(--accent);
      font-weight: 600;
      margin-top: 10px;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="brand">
      <h1>🩺 THERA GUARD AI</h1>
      <p>Clinical Pharmacist Intelligence System</p>
    </div>
  </header>

  <div class="main-grid">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Patient Raw Data</span>
        <div id="statusDot" style="width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0;"></div>
      </div>
      <textarea id="caseInput" placeholder="Paste medical history, labs, and clinical notes here..."></textarea>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Structured Pharmacist SOAP</span>
        <div class="status-indicator" id="loader" style="display:none;">
          <span style="animation: pulse 1s infinite;">●</span> PROCESSING
        </div>
      </div>
      <div id="finalOutput" class="output-area">Final report will appear here...</div>
      <div id="errorMessage" class="error-message"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-primary" id="analyzeBtn" onclick="runAnalysis()">GENERATE CLINICAL REPORT</button>
    <button class="btn-secondary" onclick="clearAll()">NEW CASE</button>
  </div>

  <footer>
    Designed & Innovated by Mohammed Al-Ishaq<br>
    © 2026 Clinical Pharmacist Intelligence Platform • Protocol-Locked
  </footer>
</div>

<script>
// تحديد مسار API حسب البيئة
const API_ENDPOINT = (() => {
  // للتطوير المحلي
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    return 'http://localhost:8787/api/ask'; // أو أي بورت يستخدمه الـ local server
  }
  // للإنتاج على Cloudflare Pages
  return '/api/ask';
})();

async function runAnalysis() {
  const input = document.getElementById("caseInput").value.trim();
  const output = document.getElementById("finalOutput");
  const errorDiv = document.getElementById("errorMessage");
  const btn = document.getElementById("analyzeBtn");
  const loader = document.getElementById("loader");
  const dot = document.getElementById("statusDot");

  // إخفاء أي رسالة خطأ سابقة
  errorDiv.style.display = "none";
  
  if (!input) {
    showError("Please enter patient data first.");
    return;
  }

  btn.disabled = true;
  loader.style.display = "flex";
  dot.style.background = "#2563eb";
  output.style.opacity = "0.5";
  output.textContent = "⏳ Analyzing case against clinical protocols...\nThis may take 30-60 seconds.";

  try {
    console.log("Sending request to:", API_ENDPOINT);
    
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({ 
        case_text: input
      })
    });

    console.log("Response status:", res.status);
    
    const data = await res.json();
    console.log("Response data:", data);

    if (!res.ok) {
      throw new Error(data.error || `Server error: ${res.status}`);
    }

    if (!data.ok) {
      throw new Error(data.error || "Analysis failed");
    }

    // عرض التقرير النهائي
    if (data.final_note) {
      output.textContent = data.final_note;
    } else if (data.soap_note) {
      output.textContent = data.soap_note;
    } else if (data.template1_soap) {
      output.textContent = data.template1_soap;
    } else {
      // إذا لم نجد أي من الحقول المتوقعة، نعرض البيانات المتاحة
      output.textContent = JSON.stringify(data, null, 2);
    }
    
    output.style.opacity = "1";
    dot.style.background = "#10b981";

  } catch (err) {
    console.error("Analysis error:", err);
    showError(err.message);
    output.textContent = "❌ Analysis failed. Please try again.";
    dot.style.background = "#ef4444";
  } finally {
    btn.disabled = false;
    loader.style.display = "none";
  }
}

function showError(message) {
  const errorDiv = document.getElementById("errorMessage");
  errorDiv.textContent = `Error: ${message}`;
  errorDiv.style.display = "block";
}

function clearAll() {
  document.getElementById("caseInput").value = "";
  document.getElementById("finalOutput").textContent = "Final report will appear here...";
  document.getElementById("statusDot").style.background = "#e2e8f0";
  document.getElementById("errorMessage").style.display = "none";
}

// إضافة معالج لأي أخطاء غير متوقعة
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.error("Global error:", {msg, url, lineNo, columnNo, error});
  showError("Unexpected error occurred");
  return false;
};
</script>

</body>
</html>
